name: Publish Docker image

# Fires on a version tag (git tag vX.Y.Z pushed to GitHub) and on a GitHub
# Release being published -- covers "git tag && git push --tags" as well
# as tagging/releasing entirely through the GitHub UI. Creating a release
# from a brand-new tag fires both triggers for the same tag; harmless
# (the second run just re-pushes the same, already-built layers), just
# worth knowing.
on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

# contents:read to check out the repo; packages:write to push to GHCR --
# GITHUB_TOKEN is scoped to exactly this, no separate registry secret
# needed.
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/freizone-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A fresh Actions checkout only ever contains tracked files -- no
      # local dev artifacts (test accounts, .env, stray binaries) exist
      # to accidentally pick up in the first place, on top of the
      # .dockerignore rules the Dockerfile already relies on locally.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
