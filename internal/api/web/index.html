<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freizone server</title>
<style>
  :root {
    --bg: #f4f6f6;
    --card: #ffffff;
    --ink: #10201d;
    --muted: #5a6b67;
    --line: #dde5e3;
    --accent: #0c8577;
    --accent-ink: #ffffff;
    --shadow: 0 1px 2px rgba(16, 32, 29, .06), 0 12px 32px rgba(16, 32, 29, .08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1513;
      --card: #14201d;
      --ink: #e8efed;
      --muted: #9fb2ad;
      --line: #21322e;
      --accent: #3fbfad;
      --accent-ink: #06201c;
      --shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 16px 40px rgba(0, 0, 0, .35);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  main {
    width: 100%;
    max-width: 30rem;
    text-align: center;
  }
  .logo {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    display: block;
  }
  h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .tagline {
    margin: 6px 0 28px;
    color: var(--muted);
    font-size: 1.02rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 22px 24px;
    text-align: left;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .02em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .badge::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  dl {
    margin: 16px 0 0;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    font-size: .95rem;
  }
  dt { color: var(--muted); }
  dd {
    margin: 0;
    text-align: right;
    font-weight: 600;
    overflow-wrap: anywhere;
  }
  .hint {
    margin: 24px 0 0;
    color: var(--muted);
    font-size: .92rem;
  }
  .hint code {
    background: var(--line);
    border-radius: 5px;
    padding: 1px 6px;
    font-size: .88em;
  }
  footer {
    margin-top: 22px;
    font-size: .85rem;
    color: var(--muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 3px;
  }
</style>
</head>

  <h1>Freizone</h1>
  <p class="tagline">Self-hosted, federated, end-to-end encrypted chat.</p>

  <div class="card">
    <span class="badge">Freizone server</span>
    <dl>
      <dt>Address</dt><dd id="host">&hellip;</dd>
      <dt>Registration</dt><dd id="registration">&hellip;</dd>
    </dl>
  </div>

  <p class="hint">
    There's nothing to browse here &mdash; Freizone lives in the app. Add this
    server there, or reach someone on it with an address like
    <code>id&#42;this-server</code>.
  </p>

  <footer>
    <a href="https://github.com/behringer24/freizone-server" rel="noopener noreferrer">About the project</a>
  </footer>
</main>

<script>
  // Reflects no request input; the only dynamic data is this same-origin
  // read of the public server-status endpoint, written via textContent
  // (never innerHTML), so there is no injection surface.
  document.getElementById('host').textContent = location.host;

  var labels = {
    open: 'Open — anyone can register',
    invite: 'Invite only',
    closed: 'Closed'
  };

  fetch('/v1/server-status', { headers: { accept: 'application/json' } })
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (s) {
      var el = document.getElementById('registration');
      if (!s.claimed) {
        el.textContent = 'Not set up yet';
        return;
      }
      el.textContent = labels[s.registration_policy] || s.registration_policy;
    })
    .catch(function () {
      document.getElementById('registration').textContent = 'unavailable';
    });
</script>
